<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Manager</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <div class="login-container">
        <p class="login-eyebrow">Meme Manager</p>
        <h1 class="login-title">输入密钥以继续</h1>
        <form method="post" class="login-box">
          <input
            class="login-input"
            type="text"
            name="key"
            placeholder="请输入密钥"
            autocomplete="one-time-code"
            autocapitalize="off"
            spellcheck="false"
            required
          />
          <button type="submit">进入管理后台</button>
        </form>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
      </div>
    </main>
  </body>
</html>
